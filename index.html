<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inert Pictures | Media Production Company</title>
    <meta name="description" content="Inert Pictures is a Film production company based in Brazil. Projects regarding documentaries, short-films, feature films and others have been executed.">
    <style>
        :root {
            --color-bg: #000000;
            --color-header-bg: #ffffff;
            --color-drawer-bg: #ffffff;
            --color-text-dark: #000000;
            --color-text-light: #ffffff;
            --color-text-muted: #707070;
            --color-border: #161616;

            --font-display: "Courier New", Courier, monospace;
            --font-sans: "Courier New", Courier, monospace;
            --font-mono: "Courier New", Courier, monospace;
        }

        /* Isolate Brand Name */
        .brand-title {
            font-family: "Times New Roman", Times, Baskerville, Georgia, serif !important;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: var(--color-bg);
            color: var(--color-text-light);
            font-family: var(--font-sans);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Social Trays Configuration */
        .social-tray {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .social-link {
            color: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease, transform 0.2s ease;
        }

        .social-link svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Specific Contextual Modifiers */
        .menu-drawer .social-tray {
            margin-top: auto;
            padding-top: 3rem;
            color: var(--color-text-dark);
        }

        .menu-drawer .social-link:hover {
            color: var(--color-text-muted);
            transform: translateY(-2px);
        }

        .site-footer .social-link:hover {
            color: #ffffff;
            transform: translateY(-2px);
        }

        /* Site Footer Structural Block */
        .site-footer {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 3rem 6rem 3rem;
            border-top: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--color-text-muted);
        }

        .copyright-notice {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Header Infrastructure */
        header {
            background-color: var(--color-header-bg);
            color: var(--color-text-dark);
            width: 100%;
            padding: 2.5rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 100;
        }

        .brand-title {
            font-family: var(--font-sans);
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-dark);
            text-decoration: none;
            line-height: 1;
        }

        .menu-control-wrapper {
            position: absolute;
            right: 3rem;
            height: 100%;
            display: flex;
            align-items: center;
        }

        .menu-btn {
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0.5rem;
            z-index: 1100;
        }

        .menu-btn span {
            display: block;
            width: 32px;
            height: 3px;
            background-color: var(--color-text-dark);
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .menu-drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: 22vw;
            height: 100vh;
            background-color: var(--color-drawer-bg);
            color: var(--color-text-dark);
            z-index: 1000;
            padding: 10rem 4rem 4rem 4rem;
            border-left: 1px solid rgba(0, 0, 0, 0.05);
            transform: translateX(100%);
            transition: transform 1.7s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }

        .menu-control-wrapper.is-active .menu-drawer {
            transform: translateX(0);
            pointer-events: auto;
        }

        .menu-control-wrapper.is-active .menu-btn span:nth-child(1) {
            transform: translateY(9px) rotate(45deg);
        }
        .menu-control-wrapper.is-active .menu-btn span:nth-child(2) {
            opacity: 0;
        }
        .menu-control-wrapper.is-active .menu-btn span:nth-child(3) {
            transform: translateY(-9px) rotate(-45deg);
        }

        .drawer-nav {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .drawer-nav a {
            font-family: var(--font-sans);
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--color-text-dark);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: max-content;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .drawer-nav a:hover {
            color: var(--color-text-muted);
            transform: translateX(5px);
        }

        /* Main Content Grid */
        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 6rem 3rem;
        }

        .hero-section {
            margin-bottom: 5rem;
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: 5rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 1rem;
        }

        .hero-subtitle {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        /* Metadata Metrics Grid */
        .system-matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            border: 1px solid var(--color-border);
            padding: 2rem;
            margin-bottom: 6rem;
        }

        .matrix-cell {
            font-family: var(--font-mono);
        }

        .matrix-label {
            font-size: 0.7rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .matrix-value {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Project Display Frame */
        .work-section {
            margin-bottom: 6rem;
        }

        .section-header {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--color-text-muted);
            margin-bottom: 2rem;
        }

        .visual-frame {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #0d0d0d;
            border: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--color-text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            header {
                padding: 2rem 1rem;
            }
            .brand-title {
                font-size: 1.4rem;
            }
            .menu-control-wrapper {
                right: 1.5rem;
            }
            .menu-drawer {
                width: 75vw;
                padding: 8rem 2rem 2rem 2rem;
                box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            }
            main {
                padding: 4rem 1.5rem;
            }
            .hero-title {
                font-size: 3.5rem;
            }
            .system-matrix {
                grid-template-columns: 1fr;
                gap: 1.5rem;
                padding: 1.5rem;
            }
            .site-footer {
                flex-direction: column;
                align-items: flex-start;
                gap: 2rem;
                padding: 2rem 1.5rem 4rem 1.5rem;
            }
        }
    </style>

    <!-- Native Interaction Toggle Engine -->
    <script>
        const wrapper = document.querySelector('.menu-control-wrapper');
        const btn = document.querySelector('.menu-btn');
        
        // Triggers target visibility state toggle on explicit click or tap events
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            wrapper.classList.toggle('is-active');
        });

        // Global viewport capture to close the drawer seamlessly if user taps outside the target field
        document.addEventListener('click', (e) => {
            if (!wrapper.contains(e.target)) {
                wrapper.classList.remove('is-active');
            }
        });
    </script>
