<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inert Pictures | Media Production Company</title>
    <meta name="description" content="Inert Pictures is a Film production company based in Brazil. Projects regarding documentaries, short-films, feature films and others have been executed.">
    <style>
        :root {
            --color-bg: #000000;
            --color-header-bg: #ffffff;
            --color-drawer-bg: #ffffff;
            --color-text-dark: #000000;
            --color-text-light: #ffffff;
            --color-text-muted: #707070;
            --color-border: #161616;
            
            --font-display: "Times New Roman", Times, Baskerville, Georgia, serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-light);
            font-family: var(--font-sans);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        header {
            background-color: var(--color-header-bg);
            color: var(--color-text-dark);
            width: 100%;
            padding: 2.5rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 100;
        }

        .brand-title {
            font-family: var(--font-sans);
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-dark);
            text-decoration: none;
            line-height: 1;
        }

        .menu-control-wrapper {
            position: absolute;
            right: 3rem;
            height: 100%;
            display: flex;
            align-items: center;
        }

        .menu-btn {
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0.5rem;
            z-index: 1100;
        }

        .menu-btn span {
            display: block;
            width: 32px;
            height: 3px;
            background-color: var(--color-text-dark);
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .menu-drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: 33.333vw;
            height: 100vh;
            background-color: var(--color-drawer-bg);
            color: var(--color-text-dark);
            z-index: 1000;
            padding: 10rem 4rem 4rem 4rem;
            border-left: 1px solid rgba(0, 0, 0, 0.05);
            transform: translateX(100%);
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
        }

        .menu-control-wrapper:hover .menu-drawer {
            transform: translateX(0);
            pointer-events: auto;
        }

        .menu-control-wrapper:hover .menu-btn span:nth-child(1) {
            transform: translateY(9px) rotate(45deg);
        }
        .menu-control-wrapper:hover .menu-btn span:nth-child(2) {
            opacity: 0;
        }
        .menu-control-wrapper:hover .menu-btn span:nth-child(3) {
            transform: translateY(-9px) rotate(-45deg);
        }

        .drawer-nav {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .drawer-nav a {
            font-family: var(--font-sans);
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--color-text-dark);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: max-content;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .drawer-nav a:hover {
            color: var(--color-text-muted);
            transform: translateX(5px);
        }

        /* Main Content Grid */
        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 6rem 3rem;
        }

        .hero-section {
            margin-bottom: 5rem;
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: 5rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 1rem;
        }

        .hero-subtitle {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        /* Metadata Metrics Grid */
        .system-matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            border: 1px solid var(--color-border);
            padding: 2rem;
            margin-bottom: 6rem;
        }

        .matrix-cell {
            font-family: var(--font-mono);
        }

        .matrix-label {
            font-size: 0.7rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .matrix-value {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Project Display Frame */
        .work-section {
            margin-bottom: 6rem;
        }

        .section-header {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--color-text-muted);
            margin-bottom: 2rem;
        }

        .visual-frame {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #0d0d0d;
            border: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--color-text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            header {
                padding: 2rem 1rem;
            }
            .brand-title {
                font-size: 1.8rem;
            }
            .menu-btn {
                right: 1.5rem;
            }
            main {
                padding: 4rem 1.5rem;
            }
            .hero-title {
                font-size: 3.5rem;
            }
            .system-matrix {
                grid-template-columns: 1fr;
                gap: 1.5rem;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Wix-Aligned Top Architecture -->
    <header>
        <a href="#" class="brand-title">Inert Pictures</a>
        
        <div class="menu-control-wrapper">
            <button class="menu-btn" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <div class="menu-drawer">
                <nav class="drawer-nav">
                    <a href="#">Início</a>
                    <a href="#">Portfolio</a>
                    <a href="#">About</a>
                    <a href="#">Contact</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <!-- Canvas area is currently cleared out and ready for your content -->
    </main>

</body>
</html>
