<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inert Pictures | Media Production Company</title>
    <meta name="description" content="Inert Pictures is a Film production company based in Brazil. Projects regarding documentaries, short-films, feature films and others have been executed.">
    <style>
        :root {
            --color-bg: #000000;
            --color-header-bg: #ffffff;
            --color-text-dark: #000000;
            --color-text-light: #ffffff;
            --color-text-muted: #707070;
            --color-border: #161616;
            
            --font-display: "Times New Roman", Times, Baskerville, Georgia, serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-light);
            font-family: var(--font-sans);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Wix-Style White Header Banner */
        header {
            background-color: var(--color-header-bg);
            color: var(--color-text-dark);
            width: 100%;
            padding: 2.5rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 1px 10px rgba(0,0,0,0.05);
        }

        .brand-title {
            font-family: var(--font-sans);
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-dark);
            text-decoration: none;
            line-height: 1;
        }

        /* Right-Aligned Hamburger Menu Button */
        .menu-btn {
            position: absolute;
            right: 3rem;
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0.5rem;
        }

        .menu-btn span {
            display: block;
            width: 32px;
            height: 3px;
            background-color: var(--color-text-dark);
            transition: transform 0.3s ease;
        }

        /* Main Content Grid */
        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 6rem 3rem;
        }

        .hero-section {
            margin-bottom: 5rem;
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: 5rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            line-height: 1;
            margin-bottom: 1rem;
        }

        .hero-subtitle {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        /* Metadata Metrics Grid */
        .system-matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            border: 1px solid var(--color-border);
            padding: 2rem;
            margin-bottom: 6rem;
        }

        .matrix-cell {
            font-family: var(--font-mono);
        }

        .matrix-label {
            font-size: 0.7rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .matrix-value {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Project Display Frame */
        .work-section {
            margin-bottom: 6rem;
        }

        .section-header {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--color-text-muted);
            margin-bottom: 2rem;
        }

        .visual-frame {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #0d0d0d;
            border: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--color-text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            header {
                padding: 2rem 1rem;
            }
            .brand-title {
                font-size: 1.8rem;
            }
            .menu-btn {
                right: 1.5rem;
            }
            main {
                padding: 4rem 1.5rem;
            }
            .hero-title {
                font-size: 3.5rem;
            }
            .system-matrix {
                grid-template-columns: 1fr;
                gap: 1.5rem;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Wix-Aligned Top Architecture -->
    <header>
        <a href="#" class="brand-title">Inert Pictures</a>
        <button class="menu-btn" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <main>
        <!-- Identity Node -->
        <section class="hero-section">
            <h1 class="hero-title">Pedro</h1>
            <div class="hero-subtitle">Director &mdash; Writer</div>
        </section>


        <!-- Visual Asset Node -->
        <section class="work-section">
            <div class="section-header">Current Project Focus</div>
            <div class="visual-frame">
                [ Winter Woman &mdash; Visual Treatment Deck ]
            </div>
        </section>
    </main>

</body>
</html>
